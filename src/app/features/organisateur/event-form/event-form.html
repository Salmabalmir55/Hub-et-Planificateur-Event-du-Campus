<div class="saas-app-container">

  <aside class="sidebar">
    <div class="brand"><h2>eCampus</h2></div>
    <nav class="menu">
      <a href="#" class="menu-item"><span class="icon">📊</span> Tableau de bord</a>
      <a href="#" class="menu-item"><span class="icon">📅</span> Mes Événements</a>
      <a href="#" class="menu-item active"><span class="icon">✍️</span> Nouvel Événement</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="page-title">
        <h1>Créer un événement</h1>
        <p class="subtitle">Remplissez les détails pour soumettre votre demande.</p>
      </div>
    </header>

    <div class="form-card">
      <form class="saas-form">

        <div class="form-section-title">Informations Générales</div>
        <div class="form-grid">
          <div class="input-group full-width">
            <label>Titre de l'événement</label>
            <input type="text" placeholder="Ex: Hackathon IA 2026">
          </div>

          <div class="input-group">
            <label>Catégorie</label>
            <select>
              <option>Conférence</option>
              <option>Atelier Pratique</option>
              <option>Événement Sportif</option>
              <option>Art & Culture</option>
            </select>
          </div>

          <div class="input-group">
            <label>Capacité Max.</label>
            <input type="number" placeholder="Ex: 150">
          </div>
        </div>

        <div class="form-section-title">Planification & Logistique</div>
        <div class="form-grid">
          <div class="input-group">
            <label>Date et Heure</label>
            <input type="datetime-local">
          </div>

          <div class="input-group">
            <label>Salle souhaitée</label>
            <select>
              <option>Amphi A (500 places)</option>
              <option>Salle Info 204 (30 places)</option>
              <option>Gymnase (1000 places)</option>
            </select>
          </div>

          <div class="input-group full-width">
            <label>Description détaillée</label>
            <textarea rows="4" placeholder="Décrivez le programme, les intervenants..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel">Annuler</button>
          <button type="submit" class="btn-submit">Soumettre pour validation</button>
        </div>
      </form>
    </div>
  </main>
</div>
