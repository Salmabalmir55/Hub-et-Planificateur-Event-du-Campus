<div class="saas-app-container">

  <aside class="sidebar">
    <div class="brand">
      <h2>eCampus</h2>
    </div>
    <nav class="menu">
      <a routerLink="/organisateur/dashboard" routerLinkActive="active" class="menu-item">
        <span class="icon">📊</span> Tableau de bord
      </a>
      <a routerLink="/organisateur/evenements" routerLinkActive="active" class="menu-item">
        <span class="icon">📅</span> Mes Événements
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="page-title">
        <h1>Événements</h1>
        <p class="subtitle">7 événements trouvés</p>
      </div>
      <div class="user-profile">
        <button class="btn-create" routerLink="/organisateur/evenements/nouveau">+ Nouvel Événement</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active">Tous les événements</button>
      <button class="tab">En attente</button>
      <button class="tab">Validés</button>
      <button class="tab">Terminés</button>
    </div>

    <div class="data-list">
      <div class="list-header">
        <div class="col-id">ID</div>
        <div class="col-name">Nom</div>
        <div class="col-place">Lieu</div>
        <div class="col-date">Date</div>
        <div class="col-cap">Cap.</div>
        <div class="col-status">Statut</div>
        <div class="col-action">Actions</div>
      </div>

      <div class="list-row">
        <div class="col-id text-gray">#1042</div>
        <div class="col-name font-medium">Hackathon IA 2026</div>
        <div class="col-place text-gray">Amphi Central, Bât. A</div>
        <div class="col-date text-gray">15 Juin 2026</div>
        <div class="col-cap text-gray">150</div>
        <div class="col-status"><span class="dot dot-pending"></span> En attente</div>
        <div class="col-action">
          <button class="icon-btn" [routerLink]="['/organisateur/evenements/modifier', 1042]" title="Modifier">⚙️</button>
          <button class="icon-btn" [routerLink]="['/organisateur/evenements', 1042, 'inscrits']" title="Voir les participants">👥</button>
        </div>
      </div>

      <div class="list-row row-active">
        <div class="col-id">#1043</div>
        <div class="col-name font-medium">Tournoi Inter-Promo</div>
        <div class="col-place">Gymnase Campus</div>
        <div class="col-date">22 Juin 2026</div>
        <div class="col-cap">300</div>
        <div class="col-status"><span class="dot dot-success"></span> Validé</div>
        <div class="col-action">
          <button class="icon-btn" [routerLink]="['/organisateur/evenements/modifier', 1043]" title="Modifier">⚙️</button>
          <button class="icon-btn" [routerLink]="['/organisateur/evenements', 1043, 'inscrits']" title="Voir les participants">👥</button>
        </div>
      </div>
    </div>
  </main>
</div>
