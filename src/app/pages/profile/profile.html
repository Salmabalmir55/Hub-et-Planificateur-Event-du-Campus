<div class="profile-container">
    <div class="profile-box">
        
        <div class="profile-left">
            <div class="profile-avatar-wrapper">
                <div class="profile-img-circle">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <label class="upload-label" for="avatar-input">
                    <i class="fa-solid fa-camera"></i>
                    <input type="file" id="avatar-input" (change)="onPhotoSelected($event)" accept="image/*">
                </label>
            </div>
            <h3 class="user-name">Anas Benjelloun</h3>
            <span class="user-role">Student</span>
        </div>

        <div class="profile-right">
            <h2 class="profile-title">My Profile</h2>

            <div class="profile-form">
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="input-field" value="Anas Benjelloun">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="input-field" value="anas.student@enset.ma">
                        <i class="fa-solid fa-envelope"></i>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" class="input-field" value="+212 600000000">
                            <i class="fa-solid fa-phone"></i>
                        </div>
                        
                        <div class="form-group">
                            <label>Role</label>
                            <select class="select-field" disabled>
                                <option value="STUDENT" selected>Student</option>
                                <option value="ORGANIZER">Organizer</option>
                            </select>
                            <i class="fa-solid fa-user-tag"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>New Password (Leave blank to keep current)</label>
                        <input type="password" class="input-field" placeholder="••••••••">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </form>
            </div>

            <button type="button" class="save-btn" (click)="modifierProfil()">Save Changes</button>
        </div>

    </div>
</div>
