<div class="catalog-container">
    
    <div class="catalog-header">
        <h1 class="page-title">Découvrir les Événements</h1>
        
        <div class="controls-wrapper">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Rechercher un événement..." [(ngModel)]="searchTerm" (input)="filterEvents()">
            </div>

            <div class="category-filters">
                <button 
                    *ngFor="let cat of categories" 
                    class="filter-btn" 
                    [class.active]="selectedCategory === cat"
                    (click)="setCategory(cat)">
                    {{ cat }}
                </button>
            </div>
        </div>
    </div>

    <div class="events-grid">
        <div class="event-card" *ngFor="let event of filteredEvents">
            
            <div class="card-image">
                <div class="placeholder-img">
                    <i class="fa-regular fa-calendar-days"></i>
                </div>
                <span class="category-badge">{{ event.category }}</span>
            </div>

            <div class="card-content">
                <h3 class="event-title">{{ event.title }}</h3>
                <div class="event-info">
                    <span><i class="fa-regular fa-clock"></i> {{ event.date }}</span>
                    <span class="event-price" [class.free]="event.price === 'Free'">{{ event.price }}</span>
                </div>
            </div>

            <div class="card-footer">
                <button class="details-btn" [routerLink]="['/event', event.id]">Voir Détails</button>
            </div>
            
        </div>

        <div class="no-results" *ngIf="filteredEvents.length === 0">
            <i class="fa-solid fa-box-open"></i>
            <p>Aucun événement trouvé pour votre recherche.</p>
        </div>
    </div>

</div>
