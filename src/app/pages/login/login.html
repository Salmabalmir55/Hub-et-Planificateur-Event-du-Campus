<div class="login-container">
  <div class="login-box">

    <div class="left-side">
      <div class="tabs">
        <button class="tab-button active">LOGIN</button>
        <button class="tab-button" routerLink="/register">SIGN UP</button>
      </div>
    </div>

    <div class="right-side">
      <div class="avatar-wrapper">
        <div class="user-icon-circle">
          <i class="fa-solid fa-user-large"></i>
        </div>
        <h2 class="main-title">LOGIN</h2>
      </div>

      <div class="form-container">
        <form (ngSubmit)="onLogin()">
          <div class="form-group">
            <input type="email" name="email" [(ngModel)]="email" class="input-field" placeholder="Email" required>
            <i class="fa-solid fa-envelope"></i>
          </div>

          <div class="form-group">
            <input type="password" name="password" [(ngModel)]="password" class="input-field" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
          </div>

          <div class="links">
            <a href="#" class="link-text">Forgot Password?</a>
          </div>

          <button type="submit" class="submit-btn">LOGIN</button>
        </form>
      </div>

      <div class="social-login">
        <a routerLink="/register" style="color: rgb(0, 33, 243); font-weight: bold; text-decoration: none; font-size: 0.9rem; cursor: pointer;">Create an account</a>
        <span class="social-text">Or Login With</span>
        <div class="social-icons">
          <div class="social-icon google"><i class="fa-brands fa-google"></i></div>
          <div class="social-icon facebook"><i class="fa-brands fa-facebook-f"></i></div>
        </div>
      </div>
    </div>

  </div>
</div>
