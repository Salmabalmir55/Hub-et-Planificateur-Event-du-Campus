<div class="register-container">
    <div class="register-box">
        
        <div class="left-side">
            <div class="tabs">
                <button class="tab-button" routerLink="/login">LOGIN</button>
                <button class="tab-button active">SIGN IN</button>
            </div>
        </div>

        <div class="right-side">
            <div class="avatar-wrapper">
                <div class="user-icon-circle">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h2 class="main-title">SIGN IN</h2>
            </div>

            <div class="form-container">
                <form>
                    <div class="form-group">
                        <input type="text" class="input-field" placeholder="Full Name">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="form-group">
                        <input type="email" class="input-field" placeholder="Email">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" class="input-field" placeholder="Password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div class="form-group">
                        <select class="select-field">
                            <option value="" disabled selected>Select Your Role</option>
                            <option value="STUDENT">Student</option>
                            <option value="ORGANIZER">Organizer</option>
                        </select>
                        <i class="fa-solid fa-user-tag"></i>
                    </div>
                </form>
            </div>

            <button type="submit" class="submit-btn">REGISTER</button>

            <div class="login-redirect">
                <a routerLink="/login" class="redirect-link" style="color: rgb(0, 33, 243); font-weight: bold; text-decoration: none; font-size: 0.9rem; cursor: pointer;">Already have an account ? Login here</a>
            </div>
        </div>

    </div>
</div>
