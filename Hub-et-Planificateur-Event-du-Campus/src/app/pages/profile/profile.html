<div class="profile-container">
  <div class="profile-card">
    <h1>Mon Profil</h1>

    <!-- État de chargement -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Chargement de votre profil...</p>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="error-message">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Message de succès -->
    <div *ngIf="successMessage" class="success-message">
      <i class="fa-solid fa-circle-check"></i>
      <span>{{ successMessage }}</span>
    </div>

    <!-- Formulaire de profil -->
    <form (ngSubmit)="updateProfile()" *ngIf="!isLoading">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" class="form-control" [(ngModel)]="user.nom" name="nom" required>
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" class="form-control" [(ngModel)]="user.prenom" name="prenom" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" class="form-control" [(ngModel)]="user.telephone" name="telephone">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save">Enregistrer</button>
        <button type="button" class="btn-logout" (click)="logout()">Déconnexion</button>
      </div>
    </form>
  </div>
</div>
