<div class="register-container">
  <div class="register-box">
    <div class="left-side">
      <div class="tabs">
        <button class="tab-button" routerLink="/login">LOGIN</button>
        <button class="tab-button active">SIGN UP</button>
      </div>
    </div>

    <div class="right-side">
      <div class="avatar-wrapper">
        <div class="user-icon-circle">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <h2 class="main-title">INSCRIPTION</h2>
      </div>

      <div class="form-container">
        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="error-message">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Message de succès -->
        <div *ngIf="successMessage" class="success-message">
          <i class="fa-solid fa-circle-check"></i>
          <span>{{ successMessage }}</span>
        </div>

        <form (ngSubmit)="onRegister()">
          <div class="form-group">
            <input type="text" name="fullName" [(ngModel)]="fullName" class="input-field" placeholder="Nom complet" required>
            <i class="fa-solid fa-user"></i>
          </div>

          <div class="form-group">
            <input type="email" name="email" [(ngModel)]="email" class="input-field" placeholder="Email" required>
            <i class="fa-solid fa-envelope"></i>
          </div>

          <div class="form-group">
            <input type="password" name="password" [(ngModel)]="password" class="input-field" placeholder="Mot de passe" required>
            <i class="fa-solid fa-lock"></i>
          </div>

          <div class="form-group">
            <select name="role" [(ngModel)]="role" class="select-field" required>
              <option value="" disabled>Sélectionnez un rôle</option>
              <option value="STUDENT">Étudiant</option>
              <option value="ORGANIZER">Organisateur</option>
            </select>
            <i class="fa-solid fa-users"></i>
          </div>

          <button type="submit" class="submit-btn" [disabled]="isLoading">
            <span *ngIf="!isLoading">S'INSCRIRE</span>
            <span *ngIf="isLoading">
              <i class="fa-solid fa-spinner fa-spin"></i> Inscription...
            </span>
          </button>
        </form>
      </div>

      <div class="login-redirect">
        <span class="social-text">Déjà un compte ?</span>
        <a routerLink="/login" class="redirect-link">Se connecter</a>
      </div>
    </div>
  </div>
</div>
